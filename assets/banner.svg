<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="MONOCYCLE — single-cycle waveform designer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0820"/>
      <stop offset="100%" stop-color="#15102e"/>
    </linearGradient>
    <radialGradient id="glow-top" cx="20%" cy="0%" r="65%">
      <stop offset="0%" stop-color="#ff2bd6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bot" cx="85%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#a060ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#a060ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ff2bd6" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="scanlines" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="2" fill="transparent"/>
      <rect y="2" width="3" height="1" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glow-top)"/>
  <rect width="1280" height="320" fill="url(#glow-bot)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#scanlines)"/>
  <rect x="0.5" y="0.5" width="1279" height="319" fill="none" stroke="#3d2c7a" stroke-width="1"/>

  <!-- Brand mark + wordmark -->
  <text x="80" y="180" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="120" fill="#ff2bd6" filter="url(#glow-magenta)">◐</text>
  <text x="180" y="160" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="86" font-weight="700" fill="#ff2bd6" letter-spacing="10" filter="url(#glow-magenta)">MONOCYCLE</text>
  <text x="182" y="205" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="20" fill="#bba5e4" letter-spacing="4">SINGLE-CYCLE WAVEFORM DESIGNER</text>

  <!-- Mini scope panel (mirrors the app's source + post-processing overlay) -->
  <g transform="translate(820, 70)">
    <rect width="400" height="180" fill="#000000" stroke="#3d2c7a" stroke-width="1"/>
    <g stroke="#ff2bd6" stroke-opacity="0.10" stroke-width="0.5">
      <line x1="0" y1="45" x2="400" y2="45"/>
      <line x1="0" y1="135" x2="400" y2="135"/>
      <line x1="100" y1="0" x2="100" y2="180"/>
      <line x1="200" y1="0" x2="200" y2="180"/>
      <line x1="300" y1="0" x2="300" y2="180"/>
    </g>
    <line x1="0" y1="90" x2="400" y2="90" stroke="#ff2bd6" stroke-opacity="0.25" stroke-width="1"/>

    <!-- Source trace: saw (dim magenta) -->
    <path d="M 0 50 L 100 130 L 100 50 L 200 130 L 200 50 L 300 130 L 300 50 L 400 130"
          fill="none" stroke="#ff2bd6" stroke-width="2" filter="url(#glow-magenta)" opacity="0.55"/>

    <!-- Output trace: filtered (neon purple, smoothed) -->
    <path d="M 0 90 C 25 50, 75 50, 100 90 C 125 130, 175 130, 200 90 C 225 50, 275 50, 300 90 C 325 130, 375 130, 400 90"
          fill="none" stroke="#a060ff" stroke-width="2.5" filter="url(#glow-purple)"/>

    <text x="386" y="20" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="11" fill="#ff2bd6" text-anchor="end" letter-spacing="2">MONOCYCLE//SCOPE</text>
    <text x="14"  y="172" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="11" fill="#bba5e4" letter-spacing="1">PEAK 1.00</text>
    <text x="115" y="172" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="11" fill="#bba5e4" letter-spacing="1">RMS 0.71</text>
    <text x="210" y="172" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="11" fill="#bba5e4" letter-spacing="1">ZCR 2</text>
    <text x="285" y="172" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="11" fill="#bba5e4" letter-spacing="1">DC +0.000</text>
  </g>

  <!-- Bottom info strip (dotted divider like the app's UI) -->
  <line x1="60" y1="265" x2="1220" y2="265" stroke="#3d2c7a" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="60" y="295" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace" font-size="13" fill="#8775b5" letter-spacing="3">48 kHz · 16 / 24-BIT PCM · MONO · GPL v3 · github.com/AOShei/MonoCycle</text>
</svg>
